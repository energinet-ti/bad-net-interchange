<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			// Apply theme synchronously before first paint so dark-mode users
			// don't see a white flash on reload. Default is "dark" if no value
			// is stored. Storage key is namespaced as "cgma:theme".
			(function () {
				try {
					var t = localStorage.getItem('cgma:theme');
					if (t === 'light') document.documentElement.classList.add('light');
				} catch (_) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
